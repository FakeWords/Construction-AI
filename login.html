<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Fieldwise</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c0f;
            --surface: #111418;
            --surface2: #181d24;
            --border: #1e2530;
            --accent: #f0a500;
            --text: #e8eaed;
            --muted: #6b7280;
            --red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(240,165,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(240,165,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 64px;
            border-bottom: 1px solid var(--border);
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .nav-logo-icon {
            width: 28px;
            height: 28px;
            background: var(--accent);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .nav-logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 2px;
            color: var(--text);
        }
        .nav-logo-text span { color: var(--accent); }

        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 440px;
            padding: 48px;
        }
        .card-label {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .card-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 40px;
            letter-spacing: 2px;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            border-radius: 2px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }
        .btn {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 2px;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn:hover { background: #d49300; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: var(--red);
            padding: 12px 16px;
            font-size: 14px;
            border-radius: 2px;
            margin-bottom: 20px;
            display: none;
        }
        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--muted);
        }
        .footer-link a {
            color: var(--accent);
            text-decoration: none;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--muted);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
    </style>
</head>
<body>
<!-- NAV -->
    <nav>
        <a href="/" class="nav-logo">
            <div class="nav-logo-icon"></div>
            <span class="nav-logo-text">FIELDWISE</span>
        </a>
        <ul class="nav-links">
            <li><a href="/drawings">Drawing Analyzer</a></li>
            <li><a href="/labor">Labor Hub</a></li>
            <li><a href="/field">Field Tool</a></li>
            <li><a href="/projects">Projects</a></li>
            <li><a href="/cart">🛒 Cart</a></li>
            <li><a href="/login">Login</a></li>
            <li><a href="/drawings" class="nav-cta">Launch App →</a></li>
        </ul>
    </nav>

    <div class="main">
        <div class="card">
            <div class="card-label">// Welcome Back</div>
            <div class="card-title">SIGN IN</div>

            <div class="error" id="error"></div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In →</button>

            <div class="footer-link">
                Don't have an account? <a href="/signup">Create one</a>
            </div>
        </div>
    </div>

    <script>
        // If already logged in, redirect
        if (localStorage.getItem('fieldwise_token')) {
            window.location.href = '/projects';
        }

        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLogin();
        });

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('error');

            error.style.display = 'none';

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.detail || 'Login failed.');
                    return;
                }

                localStorage.setItem('fieldwise_token', data.token);
                localStorage.setItem('fieldwise_user', JSON.stringify(data.user));

                const redirect = new URLSearchParams(window.location.search).get('redirect') || '/projects';
                window.location.href = redirect;

            } catch (e) {
                showError('Connection error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In →';
            }
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
<script src="/static/chatbot.js"></script>
</body>
</html>
