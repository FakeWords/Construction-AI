[phases.setup]
nixPkgs = ["python311", "tesseract", "poppler_utils", "libpq"]

[phases.install]
cmds = ["pip install --upgrade pip", "pip install psycopg2-binary bcrypt PyJWT anthropic", "pip install -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT --limit-concurrency 100 --limit-max-requests 1000 --header-limit 32768 --timeout-keep-alive 120"


