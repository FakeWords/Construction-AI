<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — Fieldwise AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c0f;
            --surface: #111418;
            --surface2: #181d24;
            --border: #1e2530;
            --accent: #f0a500;
            --text: #e8eaed;
            --muted: #6b7280;
            --green: #22c55e;
            --red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(240,165,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(240,165,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 64px;
            background: rgba(10,12,15,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .nav-logo-icon {
            width: 28px; height: 28px;
            background: var(--accent);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .nav-logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px; letter-spacing: 2px; color: var(--text);
        }
        .nav-logo-text span { color: var(--accent); }
        .nav-links {
            display: flex; align-items: center; gap: 24px; list-style: none;
        }
        .nav-links a {
            color: var(--muted); text-decoration: none;
            font-size: 14px; font-weight: 500; transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--text); }
        .nav-user {
            display: flex; align-items: center; gap: 12px;
        }
        .nav-user-name {
            font-size: 13px; color: var(--muted);
            font-family: 'DM Mono', monospace;
        }
        .btn-signout {
            font-size: 13px; color: var(--muted);
            background: none; border: 1px solid var(--border);
            padding: 6px 12px; cursor: pointer;
            border-radius: 2px; transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-signout:hover { border-color: var(--red); color: var(--red); }

        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 40px 60px;
            position: relative;
            z-index: 1;
        }
        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 48px;
        }
        .page-label {
            font-family: 'DM Mono', monospace;
            font-size: 11px; letter-spacing: 3px;
            color: var(--accent); text-transform: uppercase;
            margin-bottom: 8px;
        }
        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px; letter-spacing: 2px; line-height: 1;
        }
        .btn-new {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--accent); color: #000;
            padding: 12px 24px; border-radius: 2px;
            font-weight: 600; font-size: 14px;
            text-decoration: none; transition: background 0.2s;
        }
        .btn-new:hover { background: #d49300; }

        .tabs {
            display: flex; gap: 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
        }
        .tab {
            padding: 12px 24px;
            font-size: 14px; font-weight: 500;
            color: var(--muted); cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab:hover { color: var(--text); }

        .empty-state {
            text-align: center;
            padding: 80px 40px;
            border: 1px dashed var(--border);
        }
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px; letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .empty-sub { color: var(--muted); font-size: 15px; margin-bottom: 24px; }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2px;
            background: var(--border);
        }
        .project-card {
            background: var(--surface);
            padding: 32px;
            transition: background 0.2s;
            position: relative;
        }
        .project-card:hover { background: var(--surface2); }
        .project-meta {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px;
        }
        .project-trade {
            font-family: 'DM Mono', monospace;
            font-size: 10px; letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(240,165,0,0.1);
            color: var(--accent);
            border: 1px solid rgba(240,165,0,0.2);
            padding: 3px 8px;
        }
        .project-date {
            font-family: 'DM Mono', monospace;
            font-size: 11px; color: var(--muted);
        }
        .project-name {
            font-weight: 600; font-size: 17px;
            margin-bottom: 6px;
        }
        .project-file {
            font-size: 13px; color: var(--muted);
            margin-bottom: 20px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .project-actions {
            display: flex; gap: 8px;
        }
        .btn-sm {
            font-size: 12px; font-weight: 500;
            padding: 6px 14px; border-radius: 2px;
            cursor: pointer; transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-view {
            background: var(--accent); color: #000; border: none;
        }
        .btn-view:hover { background: #d49300; }
        .btn-share {
            background: none; color: var(--muted);
            border: 1px solid var(--border);
        }
        .btn-share:hover { border-color: var(--accent); color: var(--accent); }
        .btn-delete {
            background: none; color: var(--muted);
            border: 1px solid var(--border); margin-left: auto;
        }
        .btn-delete:hover { border-color: var(--red); color: var(--red); }

        /* Share Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 40px;
            width: 100%;
            max-width: 440px;
        }
        .modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px; letter-spacing: 1px;
            margin-bottom: 24px;
        }
        .modal input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            border-radius: 2px;
            outline: none;
            margin-bottom: 16px;
        }
        .modal input:focus { border-color: var(--accent); }
        .modal-actions { display: flex; gap: 12px; }
        .btn-cancel {
            flex: 1; padding: 12px;
            background: none; color: var(--muted);
            border: 1px solid var(--border);
            cursor: pointer; border-radius: 2px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
        }
        .btn-confirm {
            flex: 1; padding: 12px;
            background: var(--accent); color: #000;
            border: none; cursor: pointer;
            border-radius: 2px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px; font-weight: 600;
        }

        /* Analysis Modal */
        .analysis-modal {
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .analysis-content {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            line-height: 1.7;
            color: var(--text);
            white-space: pre-wrap;
            background: var(--bg);
            padding: 24px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">
            <div class="nav-logo-icon"></div>
            <span class="nav-logo-text">FIELDWISE<span> AI</span></span>
        </a>
        <ul class="nav-links">
            <li><a href="/drawings">Drawing Analyzer</a></li>
            <li><a href="/timecards">Time Cards</a></li>
            <li><a href="/projects">Projects</a></li>
        </ul>
        <div class="nav-user">
            <span class="nav-user-name" id="userName"></span>
            <button class="btn-signout" onclick="signOut()">Sign Out</button>
        </div>
    </nav>

    <div class="main">
        <div class="page-header">
            <div>
                <div class="page-label">// My Workspace</div>
                <div class="page-title">PROJECTS</div>
            </div>
            <a href="/drawings" class="btn-new">+ New Analysis</a>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="showTab('mine')">My Projects</div>
            <div class="tab" onclick="showTab('shared')">Shared With Me</div>
        </div>

        <div id="loading" class="loading">Loading projects...</div>
        <div id="mine-tab" style="display:none"></div>
        <div id="shared-tab" style="display:none"></div>
    </div>

    <!-- Share Modal -->
    <div class="modal-overlay" id="shareModal">
        <div class="modal">
            <div class="modal-title">SHARE PROJECT</div>
            <input type="email" id="shareEmail" placeholder="colleague@company.com">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeShare()">Cancel</button>
                <button class="btn-confirm" onclick="confirmShare()">Share →</button>
            </div>
        </div>
    </div>

    <!-- Analysis Modal -->
    <div class="modal-overlay" id="analysisModal">
        <div class="modal analysis-modal">
            <div class="modal-title" id="analysisTitle">ANALYSIS RESULTS</div>
            <div class="analysis-content" id="analysisContent"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeAnalysis()">Close</button>
                <button class="btn-confirm" id="downloadBtn" onclick="downloadExcel()">Download Excel →</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('fieldwise_token');
        const user = JSON.parse(localStorage.getItem('fieldwise_user') || '{}');

        if (!token) {
            window.location.href = '/login?redirect=/projects';
        }

        document.getElementById('userName').textContent = user.name || '';

        let currentShareProjectId = null;
        let currentExcelFile = null;
        let activeTab = 'mine';

        async function loadProjects() {
            try {
                const res = await fetch('/api/projects', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    signOut();
                    return;
                }
                const data = await res.json();
                document.getElementById('loading').style.display = 'none';
                renderProjects(data.projects, 'mine-tab');
                renderShared(data.shared, 'shared-tab');
                showTab(activeTab);
            } catch (e) {
                document.getElementById('loading').textContent = 'Failed to load projects.';
            }
        }

        function renderProjects(projects, containerId) {
            const el = document.getElementById(containerId);
            if (!projects || projects.length === 0) {
                el.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📐</div>
                        <div class="empty-title">NO PROJECTS YET</div>
                        <p class="empty-sub">Upload your first drawing to get started.</p>
                        <a href="/drawings" class="btn-new">+ New Analysis</a>
                    </div>`;
                return;
            }
            el.innerHTML = `<div class="projects-grid">${projects.map(p => projectCard(p)).join('')}</div>`;
        }

        function renderShared(projects, containerId) {
            const el = document.getElementById(containerId);
            if (!projects || projects.length === 0) {
                el.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🤝</div>
                        <div class="empty-title">NO SHARED PROJECTS</div>
                        <p class="empty-sub">Projects shared with you will appear here.</p>
                    </div>`;
                return;
            }
            el.innerHTML = `<div class="projects-grid">${projects.map(p => projectCard(p, true)).join('')}</div>`;
        }

        function projectCard(p, isShared = false) {
            const date = new Date(p.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            return `
                <div class="project-card">
                    <div class="project-meta">
                        <span class="project-trade">${p.trade || 'Electrical'}</span>
                        <span class="project-date">${date}</span>
                    </div>
                    <div class="project-name">${p.name}</div>
                    <div class="project-file">${p.filename || ''}</div>
                    <div class="project-actions">
                        <button class="btn-sm btn-view" onclick="viewAnalysis(${p.id}, '${p.name}', '${p.excel_filename || ''}')">View Results</button>
                        ${!isShared ? `<button class="btn-sm btn-share" onclick="openShare(${p.id})">Share</button>` : `<span style="font-size:12px;color:var(--muted);padding:6px 0">Shared by ${p.owner_name || 'teammate'}</span>`}
                        ${!isShared ? `<button class="btn-sm btn-delete" onclick="deleteProject(${p.id})">Delete</button>` : ''}
                    </div>
                </div>`;
        }

        function showTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab')[tab === 'mine' ? 0 : 1].classList.add('active');
            document.getElementById('mine-tab').style.display = tab === 'mine' ? 'block' : 'none';
            document.getElementById('shared-tab').style.display = tab === 'shared' ? 'block' : 'none';
        }

        async function viewAnalysis(projectId, name, excelFile) {
            const res = await fetch(`/api/projects/${projectId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const project = await res.json();
            document.getElementById('analysisTitle').textContent = name.toUpperCase();
            document.getElementById('analysisContent').textContent = project.analysis || 'No analysis available.';
            currentExcelFile = excelFile;
            document.getElementById('downloadBtn').style.display = excelFile ? 'block' : 'none';
            document.getElementById('analysisModal').classList.add('active');
        }

        function closeAnalysis() {
            document.getElementById('analysisModal').classList.remove('active');
        }

        function downloadExcel() {
            if (currentExcelFile) {
                window.location.href = `/api/download-excel/${currentExcelFile}`;
            }
        }

        function openShare(projectId) {
            currentShareProjectId = projectId;
            document.getElementById('shareEmail').value = '';
            document.getElementById('shareModal').classList.add('active');
        }

        function closeShare() {
            document.getElementById('shareModal').classList.remove('active');
        }

        async function confirmShare() {
            const email = document.getElementById('shareEmail').value.trim();
            if (!email) return;
            await fetch(`/api/projects/${currentShareProjectId}/share`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, permission: 'view' })
            });
            closeShare();
            alert(`Project shared with ${email}`);
        }

        async function deleteProject(projectId) {
            if (!confirm('Delete this project? This cannot be undone.')) return;
            await fetch(`/api/projects/${projectId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            loadProjects();
        }

        function signOut() {
            localStorage.removeItem('fieldwise_token');
            localStorage.removeItem('fieldwise_user');
            window.location.href = '/login';
        }

        loadProjects();
    </script>
</body>
</html>
