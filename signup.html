<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Fieldwise AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c0f;
            --surface: #111418;
            --surface2: #181d24;
            --border: #1e2530;
            --accent: #f0a500;
            --text: #e8eaed;
            --muted: #6b7280;
            --red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(240,165,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(240,165,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 64px;
            border-bottom: 1px solid var(--border);
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .nav-logo-icon {
            width: 28px;
            height: 28px;
            background: var(--accent);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .nav-logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 2px;
            color: var(--text);
        }
        .nav-logo-text span { color: var(--accent); }
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 480px;
            padding: 48px;
        }
        .card-label {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .card-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 40px;
            letter-spacing: 2px;
            margin-bottom: 32px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            border-radius: 2px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }
        .btn {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 2px;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn:hover { background: #d49300; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: var(--red);
            padding: 12px 16px;
            font-size: 14px;
            border-radius: 2px;
            margin-bottom: 20px;
            display: none;
        }
        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--muted);
        }
        .footer-link a { color: var(--accent); text-decoration: none; }
        .terms {
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            margin-top: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
  <nav>
        <a href="/" class="nav-logo">
            <div class="nav-logo-icon"></div>
            <span class="nav-logo-text">FIELDWISE<span> AI</span></span>
        </a>
        <ul style="display:flex;align-items:center;gap:24px;list-style:none;">
            <li><a href="/drawings" style="color:#6b7280;text-decoration:none;font-size:14px;">Drawing Analyzer</a></li>
            <li><a href="/timecards" style="color:#6b7280;text-decoration:none;font-size:14px;">Time Cards</a></li>
            <li><a href="/field" style="color:#6b7280;text-decoration:none;font-size:14px;">Field Tool</a></li>
            <li><a href="/projects" style="color:#6b7280;text-decoration:none;font-size:14px;">Projects</a></li>
        </ul>
    </nav>

    <div class="main">
        <div class="card">
            <div class="card-label">// Get Started</div>
            <div class="card-title">CREATE ACCOUNT</div>

            <div class="error" id="error"></div>

            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="name" placeholder="John">
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" id="company" placeholder="Acme GC">
                </div>
            </div>

            <div class="form-group">
                <label>Work Email</label>
                <input type="email" id="email" placeholder="you@company.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Min. 8 characters">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm" placeholder="Repeat password">
            </div>

            <button class="btn" id="signupBtn" onclick="handleSignup()">Create Account →</button>

            <div class="terms">
                By creating an account you agree to our terms of service.
            </div>

            <div class="footer-link">
                Already have an account? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('fieldwise_token')) {
            window.location.href = '/projects';
        }

        async function handleSignup() {
            const name = document.getElementById('name').value.trim();
            const company = document.getElementById('company').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const btn = document.getElementById('signupBtn');

            document.getElementById('error').style.display = 'none';

            if (!name || !email || !password) {
                showError('Please fill in all required fields.');
                return;
            }
            if (password.length < 8) {
                showError('Password must be at least 8 characters.');
                return;
            }
            if (password !== confirm) {
                showError('Passwords do not match.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, company })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.detail || 'Signup failed.');
                    return;
                }

                localStorage.setItem('fieldwise_token', data.token);
                localStorage.setItem('fieldwise_user', JSON.stringify(data.user));
                window.location.href = '/projects';

            } catch (e) {
                showError('Connection error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account →';
            }
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
<script src="/static/chatbot.js"></script>
</body>
</html>
